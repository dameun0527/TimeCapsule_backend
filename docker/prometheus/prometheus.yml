global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # TimeCapsule Backend Application
  - job_name: 'timecapsule-backend'
    static_configs:
      - targets: ['timecapsule-backend:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
