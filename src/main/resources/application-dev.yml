server:
  port: 8081

spring:
  # Mail Configuration (개발환경 - MailHog)
  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          debug: false
          connectiontimeout: 5000
          starttls:
            enable: false

  # Database Configuration (개발환경)
  datasource:
    url: jdbc:mysql://localhost:3307/timecapsule?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    # username과 password는 application-secret.yml에서 관리
  
  # JPA Configuration (개발환경)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  
  # Redis Configuration (개발환경)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# Logging Configuration (개발환경)
logging:
  level:
    com.example.timecapsule_backend: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG